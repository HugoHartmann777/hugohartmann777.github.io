<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>中医养生</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    text-align:center;
    padding:40px;
}

h1{
    color:#333;
}

.card{
    background:white;
    padding:30px;
    margin:auto;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
    background:#007bff;
    color:white;
    border:none;
    padding:10px 20px;
    border-radius:5px;
    cursor:pointer;
}

img{
    max-width: 90%;
    height: auto;
    margin-top: 20px;
    border-radius: 10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    display:block;
    margin-left:auto;
    margin-right:auto;
}

h2{
    margin-top:40px;
    color:#555;
}
</style>

</head>

<body>

<div class="card">
    <h1>我们一起锻炼吧</h1>
    <button>我们直接锻炼吧</button>
</div>

<h2>养生指南图片</h2>

<div id="content">
    <img src="IMG_1999.jpg" alt="养生指南图片">
</div>

</body>
</html>
